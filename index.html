<!DOCTYPE html>
<html lang="en">
<head>
	<title>Happy Birthday Mommy! ❤️</title>
	<meta charset="UTF-8" />
	<meta name="description" content="Happy Birthday Mommy">
	<meta name="robots" content="index, follow" />
	<link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
	<link rel="author" href="alex" /> 
	<meta name="keywords" content="Birthday, Happy">

	<meta property="og:type" content="E-Greeting" />
	<meta property="og:image" content="favicon.ico" />
	<meta property="og:description" content="Wish you a very Happy Birthday">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0, minimum-scale=1.0, maximum-scale=1.0">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<meta http-equiv="X-UA-Compatible" content="IE=9; IE=8; IE=7; IE=EDGE" />
	
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/css/bootstrap.min.css">
	<link rel="stylesheet" type="text/css" href="css/stylesheet.css">
	<link rel="stylesheet" type="text/css" href="css/loading.css">
	<link href='https://fonts.googleapis.com/css?family=Signika' rel='stylesheet' type='text/css'>
	<link rel="stylesheet/less" href="cake.less"> 
	
	<style type="text/css" id="less:birthday-cake">
	/* ============================================== POSITION */
	.cake {
	  position: absolute;
	  display: none;
	  left: 50%;
	  margin-left: -150px;
	  width: 300px;
	  height: 300px;
	}
	/* ============================================== BASE */
	.cake:after {
	  background: #ffffff;
	  border-radius: 300px;
	  content: "";
	  position: absolute;
	  bottom: 0;
	  left: 0;
	  width: 300px;
	  height: 6px;
	}
	/* ============================================== Candle */
	.velas {
	  background: #ffffff;
	  border-radius: 100%;
	  position: absolute;
	  top: 50%;
	  left: 50%;
	  margin-left: -7.5px;
	  margin-top: -25px;
	  width: 15px;
	  height: 50px;
	}
	.velas:after,
	.velas:before {
	  background: rgba(255, 0, 0, 0.4);
	  content: "";
	  position: absolute;
	  width: 100%;
	  height: 6.66666667px;
	}
	.velas:after {
	  top: 25%;
	  left: 0;
	}
	.velas:before {
	  top: 45%;
	  left: 0;
	}
	/* ============================================== Fire */
	.fuego {
	  display: none;
	  border-radius: 100%;
	  box-shadow: 0 0 40px 10px rgba(248, 233, 209, 0.2);
	  position: absolute;
	  top: -12px;
	  left: 50%;
	  margin-left: -10px;
	  width: 20px;
	  height: 37.5px;
	}
	.fuego:nth-child(1) {
	  animation: fuego 2s infinite;
	}
	.fuego:nth-child(2) {
	  animation: fuego 1.5s infinite;
	}
	.fuego:nth-child(3) {
	  animation: fuego 1s infinite;
	}
	.fuego:nth-child(4) {
	  animation: fuego 0.5s infinite;
	}
	
	@keyframes fuego {
	  0%, 100% { transform: scale(1); background: rgba(254, 248, 97, 0.5); }
	  50% { transform: scale(1.1); background: rgba(255, 50, 0, 0.6); }
	}
	</style>
</head>

<div class="loading"></div>

<body>
	<div class="container">
		<div class="row">
			<div class="col-md-12 text-center">
				<img src="assets/images/bulb_off.png" id="bulb" class="img-responsive center-block" alt="Bulb">
			</div>
		</div>

		<div class="row message-container">
			<div class="col-md-12 text-center">
				<div class="cake">
					<div class="velas">
						<div class="fuego"></div>
						<div class="fuego"></div>
						<div class="fuego"></div>
						<div class="fuego"></div>
					</div>
				</div>
			</div>
		</div>

		<div class="navbar navbar-default navbar-fixed-bottom">
			<div class="row">
				<div class="col-md-12 text-center">
					<button class="btn btn-primary" id="turn_on">Turn On Lights</button>
					<button class="btn btn-primary" id="play">Play Music</button>
					<button class="btn btn-primary" id="bannar_coming">Let's Decorate</button>
					<button class="btn btn-primary" id="balloons_flying">Fly Balloons</button>
					<button class="btn btn-primary" id="cake_fadein">Cake Time</button>
					<button class="btn btn-primary" id="light_candle">Light Candle</button>
					<button class="btn btn-primary" id="wish_message">Happy Birthday</button>
					<button class="btn btn-primary" id="story">A Message for You</button>
				</div>
			</div>
		</div>
	</div>

	<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/js/bootstrap.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/less.js/2.5.1/less.min.js"></script>
	<script src="js/effect.js"></script>
</body>
</html>
